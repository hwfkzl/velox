name: singbox_flutter
description: Flutter plugin for sing-box VPN core integration
version: 0.1.0
homepage: https://github.com/velox/singbox_flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.velox.singbox_flutter
        pluginClass: SingboxFlutterPlugin
      ios:
        pluginClass: SingboxFlutterPlugin
      macos:
        pluginClass: SingboxFlutterPlugin
      windows:
        pluginClass: SingboxFlutterPluginCApi
      linux:
        pluginClass: SingboxFlutterPlugin
