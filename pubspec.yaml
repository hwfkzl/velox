name: velox
description: "GlobalFast"
publish_to: 'none'
version: 1.0.12+13

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 国际化
  intl: ^0.20.2

  # 路由
  go_router: ^17.1.0

  # 依赖注入
  get_it: ^9.2.1

  # JSON 序列化
  json_annotation: ^4.8.1
  freezed_annotation: ^3.1.0

  # UI 组件
  cupertino_icons: ^1.0.8
  country_flags: ^3.0.0
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^9.0.0
  pull_to_refresh: ^2.0.0
  fl_chart: ^1.1.1
  flutter_html: ^3.0.0-beta.2

  # 工具库
  crypto: ^3.0.3
  encrypt: ^5.0.3
  logger: ^2.2.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.2.4
  path_provider: ^2.1.2
  # connectivity_plus: ^6.0.2  # Removed - causes crash on iOS 18.5
  permission_handler: ^12.0.1

  # WebView
  webview_flutter: ^4.10.0

  # 文件打开
  open_file: ^3.3.2

  # 文件分享(反馈日志导出用系统 share sheet)
  share_plus: ^11.0.0

  # ZIP 打包(反馈日志打包)
  archive: ^4.0.0

  # 图片选择
  image_picker: ^1.1.2

  # 环境变量
  flutter_dotenv: ^6.0.0

  # VPN 核心 (sing-box)
  singbox_flutter:
    path: packages/singbox_flutter
  qr_flutter: ^4.1.0
  tray_manager: ^0.5.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 测试工具
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # 代码生成
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^3.2.3


  # 图标生成
  flutter_launcher_icons: ^0.14.3
  image: ^4.2.0

flutter_launcher_icons:
  image_path: "assets/icons/app_icon.png"
  android: true
  ios: true
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#0A1628"
    theme_color: "#0A1628"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/icons/
    - assets/geo/
